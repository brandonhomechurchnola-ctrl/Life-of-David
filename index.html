<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home Church — The Life of David</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Source+Serif+Pro:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #ffffff;
    --ink: #111111;
    --ink-2: #2a2a2a;
    --muted: #6b6b6b;
    --faint: #9a9a9a;
    --line: #e8e8e8;
    --line-2: #f1f1f1;
    --gold: #D3BC8D;
    --gold-deep: #b39966;
    --gold-soft: #f5efe1;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    font-size: 16px;
  }
  .serif { font-family: 'Source Serif Pro', Georgia, serif; }
  header.site {
    text-align: center;
    padding: 3rem 1.25rem 2rem;
    border-bottom: 1px solid var(--line);
  }
  .eyebrow {
    font-family: 'Inter', sans-serif;
    font-size: .75rem;
    text-transform: uppercase;
    letter-spacing: 4px;
    color: var(--muted);
    margin: 0 0 1rem;
    font-weight: 500;
  }
  h1.title {
    font-family: 'Source Serif Pro', Georgia, serif;
    font-weight: 600;
    font-size: clamp(2rem, 5vw, 3rem);
    margin: 0 0 .5rem;
    color: var(--ink);
    letter-spacing: -.5px;
    line-height: 1.1;
  }
  .subtitle {
    color: var(--muted);
    font-size: .98rem;
    margin: 0 auto 1.5rem;
    max-width: 480px;
  }
  .gold-rule {
    width: 56px;
    height: 2px;
    background: var(--gold);
    margin: 0 auto 1.5rem;
  }
  .progress-wrap { max-width: 420px; margin: 0 auto; }
  .progress-text {
    font-size: .82rem;
    color: var(--muted);
    margin-bottom: .45rem;
    letter-spacing: .3px;
  }
  .progress-text strong { color: var(--ink); font-weight: 600; }
  .progress-bar {
    background: var(--line-2);
    height: 5px;
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-fill {
    background: var(--gold);
    height: 100%;
    width: 0%;
    transition: width .5s ease;
  }
  main {
    max-width: 760px;
    margin: 0 auto;
    padding: 2rem 1.25rem 4rem;
  }
  .controls {
    display: flex;
    gap: .5rem;
    flex-wrap: wrap;
    align-items: center;
    margin-bottom: 1.75rem;
  }
  .controls button {
    background: #fff;
    color: var(--ink);
    border: 1px solid var(--line);
    padding: .55rem 1rem;
    border-radius: 4px;
    font-family: 'Inter', sans-serif;
    font-size: .85rem;
    font-weight: 500;
    cursor: pointer;
    transition: all .15s;
    letter-spacing: .2px;
  }
  .controls button:hover {
    border-color: var(--ink);
    background: #fafafa;
  }
  .controls button.primary {
    background: var(--ink);
    color: #fff;
    border-color: var(--ink);
  }
  .controls button.primary:hover { background: #333; }
  .controls button.ghost {
    border-color: transparent;
    color: var(--muted);
  }
  .controls button.ghost:hover { color: var(--ink); border-color: var(--line); }
  .controls .spacer { flex: 1; }
  .week {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 6px;
    margin-bottom: 1rem;
    overflow: hidden;
    transition: border-color .15s;
  }
  .week:hover { border-color: #d8d8d8; }
  .week-header {
    padding: 1.1rem 1.4rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 1rem;
    user-select: none;
    transition: background .12s;
  }
  .week-header:hover { background: #fafafa; }
  .week.open .week-header {
    border-bottom: 1px solid var(--line);
  }
  .week-meta { flex: 1; min-width: 0; }
  .week-number {
    font-family: 'Inter', sans-serif;
    font-size: .7rem;
    text-transform: uppercase;
    letter-spacing: 2.5px;
    color: var(--gold-deep);
    font-weight: 600;
    margin-bottom: .15rem;
  }
  .week-title {
    font-family: 'Source Serif Pro', serif;
    font-size: 1.35rem;
    margin: 0;
    color: var(--ink);
    line-height: 1.2;
    font-weight: 600;
    letter-spacing: -.2px;
  }
  .week-progress {
    font-size: .82rem;
    color: var(--muted);
    white-space: nowrap;
    font-variant-numeric: tabular-nums;
  }
  .chevron {
    color: var(--faint);
    transition: transform .2s, color .15s;
    font-size: .85rem;
  }
  .week:hover .chevron { color: var(--ink); }
  .week.open .chevron { transform: rotate(90deg); color: var(--gold-deep); }
  .week-body { display: none; }
  .week.open .week-body { display: block; }
  .day {
    padding: 1.5rem 1.4rem;
    border-top: 1px solid var(--line-2);
    display: grid;
    grid-template-columns: 40px 1fr auto;
    gap: 1.1rem;
    align-items: start;
  }
  .day:first-child { border-top: none; }
  .day.complete { background: #fcfaf5; }
  .day.today {
    background: linear-gradient(180deg, #fdfaf2 0%, #fff 100%);
    border-left: 3px solid var(--gold);
    padding-left: calc(1.4rem - 3px);
  }
  .day-num {
    width: 36px;
    height: 36px;
    border: 1.5px solid var(--ink);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Source Serif Pro', serif;
    font-weight: 600;
    color: var(--ink);
    font-size: .9rem;
    background: #fff;
    font-variant-numeric: tabular-nums;
    transition: all .15s;
  }
  .day.complete .day-num {
    background: var(--gold);
    border-color: var(--gold);
    color: var(--ink);
  }
  .day.today .day-num {
    background: var(--ink);
    border-color: var(--ink);
    color: var(--gold);
  }
  .day-content { min-width: 0; }
  .day-ref {
    font-family: 'Source Serif Pro', serif;
    font-weight: 600;
    color: var(--ink);
    font-size: 1.08rem;
    margin: 0 0 .15rem;
    letter-spacing: -.1px;
  }
  .day-ref .day-tag {
    font-family: 'Inter', sans-serif;
    font-size: .68rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--gold-deep);
    margin-right: .55rem;
    vertical-align: middle;
  }
  .day-focus {
    color: var(--muted);
    font-style: italic;
    font-size: .96rem;
    margin: 0 0 1rem;
    font-family: 'Source Serif Pro', serif;
  }
  .day-section { margin-top: .9rem; }
  .day-label {
    font-family: 'Inter', sans-serif;
    font-size: .7rem;
    text-transform: uppercase;
    letter-spacing: 2.5px;
    color: var(--ink);
    font-weight: 600;
    display: block;
    margin-bottom: .4rem;
  }
  .day-section ul {
    margin: 0;
    padding-left: 1.1rem;
    list-style: none;
  }
  .day-section ul li {
    margin-bottom: .35rem;
    color: var(--ink-2);
    position: relative;
    line-height: 1.55;
  }
  .day-section ul li::before {
    content: "";
    position: absolute;
    left: -1.1rem;
    top: .65em;
    width: 5px;
    height: 5px;
    background: var(--gold);
    border-radius: 50%;
  }
  .day-section.pray p {
    margin: 0;
    color: var(--ink-2);
    font-family: 'Source Serif Pro', serif;
    font-style: italic;
    line-height: 1.55;
    padding-left: .9rem;
    border-left: 2px solid var(--gold);
  }
  .check-btn {
    background: #fff;
    color: var(--muted);
    border: 1px solid var(--line);
    padding: .45rem .85rem;
    border-radius: 4px;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    font-size: .78rem;
    font-weight: 500;
    white-space: nowrap;
    transition: all .15s;
    letter-spacing: .2px;
  }
  .check-btn:hover {
    border-color: var(--ink);
    color: var(--ink);
  }
  .day.complete .check-btn {
    background: var(--ink);
    color: var(--gold);
    border-color: var(--ink);
  }
  footer {
    text-align: center;
    color: var(--muted);
    font-size: .82rem;
    padding: 2rem 1rem 3rem;
    font-style: italic;
    font-family: 'Source Serif Pro', serif;
  }
  @media (max-width: 600px) {
    .day {
      grid-template-columns: 32px 1fr;
      gap: .85rem;
      padding: 1.2rem 1rem;
    }
    .day.today { padding-left: calc(1rem - 3px); }
    .day-num { width: 30px; height: 30px; font-size: .82rem; }
    .check-btn { grid-column: 1 / -1; justify-self: end; margin-top: .25rem; }
    .week-header { padding: 1rem 1.1rem; }
    .week-title { font-size: 1.2rem; }
    main { padding: 1.5rem .9rem 3rem; }
    h1.title { font-size: 1.85rem; }
  }
</style>
</head>
<body>

<header class="site">
  <p class="eyebrow">Home Church</p>
  <h1 class="title">The Life of David</h1>
  <p class="subtitle">A 20-week devotional walk through 1 &amp; 2 Samuel, 1 Chronicles, and the Psalms.</p>
  <div class="gold-rule"></div>
  <div class="progress-wrap">
    <div class="progress-text"><strong id="progress-count">0</strong> of 140 days complete</div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
  </div>
</header>

<main>
  <div class="controls">
    <button class="primary" id="jump-today">Go to today</button>
    <button id="expand-all">Expand all</button>
    <button id="collapse-all">Collapse all</button>
    <div class="spacer"></div>
    <button class="ghost" id="reset-progress">Reset progress</button>
  </div>
  <div id="weeks-container"></div>
</main>

<footer>
  Walk slowly. Read prayerfully.
</footer>

<script src="plan-data.js"></script>
<script>
const STORAGE_KEY = "lifeOfDavid.progress.v3";

function load() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}"); } catch(e) { return {}; } }
function save(p) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(p)); } catch(e) {} }
let progress = load();

const totalDays = () => PLAN.reduce((s, w) => s + w.days.length, 0);
const completedCount = () => Object.values(progress).filter(Boolean).length;

function todayDayNumber() {
  const total = totalDays();
  let n = 1;
  while (n <= total && progress[n]) n++;
  return Math.min(n, total);
}

function updateProgressBar() {
  const done = completedCount();
  document.getElementById("progress-count").textContent = done;
  document.getElementById("progress-fill").style.width = (done / totalDays() * 100) + "%";
}

function weekProgressText(w) {
  const done = w.days.filter(d => progress[d.day]).length;
  return done + " / " + w.days.length;
}

function render() {
  const container = document.getElementById("weeks-container");
  container.innerHTML = "";
  const today = todayDayNumber();

  PLAN.forEach(w => {
    const weekEl = document.createElement("section");
    weekEl.className = "week";
    weekEl.dataset.week = w.week;

    const header = document.createElement("div");
    header.className = "week-header";
    header.innerHTML = `
      <div class="week-meta">
        <div class="week-number">Week ${w.week}</div>
        <h2 class="week-title">${w.title}</h2>
      </div>
      <span class="week-progress">${weekProgressText(w)}</span>
      <span class="chevron">&#9656;</span>
    `;
    header.addEventListener("click", () => weekEl.classList.toggle("open"));
    weekEl.appendChild(header);

    const body = document.createElement("div");
    body.className = "week-body";
    w.days.forEach(d => {
      const isComplete = !!progress[d.day];
      const isToday = d.day === today;
      const dayEl = document.createElement("div");
      dayEl.className = "day" + (isComplete ? " complete" : "") + (isToday ? " today" : "");
      dayEl.id = "day-" + d.day;
      dayEl.innerHTML = `
        <div class="day-num">${d.day}</div>
        <div class="day-content">
          <div class="day-ref"><span class="day-tag">${isToday ? "Today" : "Day " + d.day}</span>${d.ref}</div>
          <p class="day-focus">${d.focus}</p>
          <div class="day-section">
            <span class="day-label">Reflect</span>
            <ul>${d.reflect.map(r => `<li>${r}</li>`).join("")}</ul>
          </div>
          <div class="day-section pray">
            <span class="day-label">Pray</span>
            <p>${d.pray}</p>
          </div>
        </div>
        <button class="check-btn" onclick="toggleDay(${d.day})">${isComplete ? "✓ Done" : "Mark done"}</button>
      `;
      body.appendChild(dayEl);
    });
    weekEl.appendChild(body);
    container.appendChild(weekEl);
  });

  updateProgressBar();
}

function toggleDay(dayNum) {
  progress[dayNum] = !progress[dayNum];
  save(progress);
  render();
  const el = document.getElementById("day-" + dayNum);
  if (el) el.scrollIntoView({behavior: "smooth", block: "nearest"});
}

document.getElementById("jump-today").addEventListener("click", () => {
  const today = todayDayNumber();
  const el = document.getElementById("day-" + today);
  if (el) el.scrollIntoView({behavior: "smooth", block: "center"});
});

document.getElementById("expand-all").addEventListener("click", () => {
  document.querySelectorAll(".week").forEach(w => w.classList.add("open"));
});

document.getElementById("collapse-all").addEventListener("click", () => {
  document.querySelectorAll(".week").forEach(w => w.classList.remove("open"));
});

document.getElementById("reset-progress").addEventListener("click", () => {
  if (confirm("Reset all progress? This cannot be undone.")) {
    progress = {};
    save(progress);
    render();
  }
});

render();
</script>
</body>
</html>
